version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aims-postgres
    environment:
      POSTGRES_DB: aims_db
      POSTGRES_USER: aims_user
      POSTGRES_PASSWORD: aims_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aims_user -d aims_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aims-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aims_db
      SPRING_DATASOURCE_USERNAME: aims_user
      SPRING_DATASOURCE_PASSWORD: aims_password
      JWT_SECRET: aims-enterprise-jwt-secret-key-minimum-256-bits-long-for-production
      JWT_EXPIRATION: 3600000
      JWT_REFRESH_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aims-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
